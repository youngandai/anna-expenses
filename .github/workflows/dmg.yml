# Build a DMG installer for AnnaExpenses.
#
# This is a manually-triggered workflow for creating a pretty DMG with
# drag-to-Applications layout. DMGs are only needed for new users — existing
# users get updates via Sparkle auto-update.
#
# The DMG uses `create-dmg` which requires AppleScript/Finder access,
# so it must run on a self-hosted runner with the `dmg` label where
# Finder automation has been pre-approved.

name: Create DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build DMG from (e.g. v1.2.3). Leave empty to build from latest main."
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: AnnaExpenses
  RELEASES_REPO: youngandai/mac-app-releases
  APPCAST_DIR: anna-expenses

jobs:
  dmg:
    runs-on: [self-hosted, macOS, dmg]

    steps:
      - name: Determine ref and version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            # Strip leading 'v' if present
            VERSION="${INPUT_VERSION#v}"
            REF="v${VERSION}"
          else
            VERSION="0.0.0-dev"
            REF="${GITHUB_SHA}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Building DMG for $APP_NAME v$VERSION (ref=$REF)"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.ref }}

      # ── Import signing certificate ──
      - name: Import Developer ID certificate
        id: keychain
        if: inputs.version != ''
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing-${{ github.run_id }}.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "password=$KEYCHAIN_PASSWORD" >> $GITHUB_OUTPUT

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_FILE="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"
          security import "$CERT_FILE" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_FILE"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          echo "--- Imported identities ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ── Build the app ──
      - name: Generate Xcode project
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/make-app.sh generate

      - name: Build
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/make-app.sh build

      # ── Sign ──
      - name: Code sign (ad-hoc)
        if: inputs.version == ''
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_IDENTITY: "-"
        run: scripts/make-app.sh sign

      - name: Code sign (Developer ID)
        if: inputs.version != ''
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
          KEYCHAIN_PASSWORD: ${{ steps.keychain.outputs.password }}
        run: scripts/make-app.sh sign

      # ── Notarize (release only) ──
      - name: Notarize app
        if: inputs.version != ''
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: scripts/make-app.sh notarize

      # ── Create DMG ──
      - name: Create DMG
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/make-app.sh dmg

      # ── Upload ──
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}-dmg
          path: build/${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
          retention-days: 90

      - name: Attach DMG to GitHub releases
        if: inputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Attach to source repo release
          gh release upload "v${VERSION}" \
            "build/$APP_NAME-${VERSION}.dmg" \
            --clobber || echo "No source release found for v${VERSION}"

      - name: Attach DMG to mac-app-releases
        if: inputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.MAC_APP_RELEASES_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "$APPCAST_DIR-v${VERSION}" \
            "build/$APP_NAME-${VERSION}.dmg" \
            --repo "$RELEASES_REPO" \
            --clobber || echo "No release found for $APPCAST_DIR-v${VERSION}"

      # ── Cleanup ──
      - name: Clean up signing keychain
        if: always() && inputs.version != ''
        run: |
          KEYCHAIN_PATH="${{ steps.keychain.outputs.path }}"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
            echo "Deleted temporary keychain"
          fi
