name: Build AnnaExpenses

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "ANNA_EXPENSES_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "ANNA_EXPENSES_VERSION=0.0.0-dev" >> $GITHUB_ENV
          fi

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/certificate.p12"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "--- Verifying certificate import ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build and package .app (ad-hoc for dev)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: scripts/make-app.sh
        env:
          SIGNING_IDENTITY: "-"

      - name: Build and package .app (Developer ID + notarization for release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: scripts/make-app.sh
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}

      - name: Zip app
        run: ditto -c -k --keepParent build/AnnaExpenses.app build/AnnaExpenses.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnnaExpenses.app
          path: build/AnnaExpenses.app.zip
          retention-days: 90

      - name: Generate Sparkle signature
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | build/DerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update build/AnnaExpenses.app.zip --ed-key-file -)
          echo "SPARKLE_SIG<<EOF" >> $GITHUB_ENV
          echo "$SIGN_OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate appcast.xml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PUBDATE="$(date -R)"
          cat > build/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>AnnaExpenses Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${PUBDATE}</pubDate>
                <enclosure
                  url="https://github.com/youngandai/mac-app-releases/releases/download/anna-expenses-v${VERSION}/AnnaExpenses.app.zip"
                  type="application/octet-stream"
                  ${SPARKLE_SIG}
                />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Create GitHub Release (source repo)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "v${VERSION}" \
            --title "AnnaExpenses v${VERSION}" \
            --generate-notes \
            build/AnnaExpenses.app.zip \
            build/appcast.xml

      - name: Publish to public releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.MAC_APP_RELEASES_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "anna-expenses-v${VERSION}" \
            --repo youngandai/mac-app-releases \
            --title "AnnaExpenses v${VERSION}" \
            --notes "AnnaExpenses v${VERSION}" \
            build/AnnaExpenses.app.zip
          # Push appcast.xml for GitHub Pages
          cd /tmp
          rm -rf mac-app-releases
          git clone https://x-access-token:${GH_TOKEN}@github.com/youngandai/mac-app-releases.git
          mkdir -p mac-app-releases/anna-expenses
          cp ${GITHUB_WORKSPACE}/build/appcast.xml mac-app-releases/anna-expenses/appcast.xml
          cd mac-app-releases
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anna-expenses/appcast.xml
          git commit -m "Update AnnaExpenses appcast for v${VERSION}"
          git push origin main
          rm -rf /tmp/mac-app-releases

      - name: Clean up signing keychain
        if: always() && startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
