# Build, sign, notarize, and distribute AnnaExpenses via Sparkle auto-updates.
#
# This workflow is designed to be reusable across multiple mac apps in the
# youngandai org. Each app publishes to youngandai/mac-app-releases, which
# hosts appcast.xml files via GitHub Pages and .zip downloads via Releases.
#
# === REQUIRED GITHUB SECRETS ===
#
#   DEVELOPER_ID_CERTIFICATE_P12
#     Base64-encoded .p12 file containing your "Developer ID Application"
#     certificate and its private key. To create:
#       1. Open Keychain Access → My Certificates
#       2. Right-click "Developer ID Application: ..." → Export as .p12
#       3. Run: base64 -i cert.p12 | pbcopy
#       4. Paste into this secret
#
#   DEVELOPER_ID_CERTIFICATE_PASSWORD
#     The password you set when exporting the .p12 file.
#
#   APPLE_ID
#     Your Apple Developer account email (e.g. you@example.com).
#
#   APPLE_TEAM_ID
#     Your 10-character Apple Developer Team ID.
#     Find it at: https://developer.apple.com/account → Membership Details
#
#   NOTARIZATION_PASSWORD
#     An app-specific password for notarization (NOT your Apple ID password).
#     Create one at: https://appleid.apple.com → Sign-In and Security →
#     App-Specific Passwords → Generate
#
#   SPARKLE_PRIVATE_KEY
#     The Ed25519 private key generated by Sparkle's `generate_keys` tool.
#     Used to sign update archives so the app can verify authenticity.
#     The corresponding public key is embedded in the app's Info.plist
#     as SUPublicEDKey.
#
#   MAC_APP_RELEASES_TOKEN
#     A GitHub Personal Access Token (classic) with `repo` scope, granting
#     push access to youngandai/mac-app-releases. Needed because GITHUB_TOKEN
#     only has access to the current repo.
#
# === HOW TO RELEASE ===
#
#   git tag v1.2.3
#   git push origin v1.2.3
#
# === ARCHITECTURE ===
#
#   Source repo (this)              → builds, signs, notarizes
#   youngandai/mac-app-releases    → hosts appcast.xml (GitHub Pages) +
#                                    .zip downloads (GitHub Releases)
#   User's app                     → polls appcast.xml via Sparkle →
#                                    downloads + verifies + installs update
#
# === macOS `security` CLI REFERENCE ===
#
#   create-keychain -p <pw> <path>
#     Creates a new keychain file. We create a temp keychain per build so
#     we control the password and isolate from other builds.
#
#   set-keychain-settings -lut <seconds> <keychain>
#     Configures auto-lock: -l = lock on sleep, -u = use timeout,
#     -t = timeout seconds. Prevents mid-build lockout.
#
#   unlock-keychain -p <pw> <keychain>
#     Unlocks the keychain so codesign can read keys from it.
#
#   import <file> -k <keychain> -P <pw> -T <app> ...
#     Imports a .p12 certificate+key into the keychain.
#     -T grants specific apps (codesign, security) access to the key.
#
#   set-key-partition-list -S apple-tool:,apple: -k <pw> <keychain>
#     CRITICAL FOR CI: Grants codesign access without a GUI prompt.
#     Without this, macOS pops up "allow keychain access?" dialog which
#     hangs forever in headless CI. The partition IDs "apple-tool:" and
#     "apple:" are required for Apple's signing tools.
#
#   list-keychains -d user -s <keychains...>
#     Sets the keychain search list. Must APPEND (not replace) to preserve
#     access to system root certificates needed for signature validation.
#
#   find-identity -v -p codesigning <keychain>
#     Lists valid code signing identities. Used to verify import worked.
#
#   delete-keychain <keychain>
#     Removes keychain file and drops it from the search list. Always do
#     this in cleanup to avoid leaking certificates between builds.

name: Build AnnaExpenses (v2)

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

# Prevent concurrent release builds from colliding
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── App identity ──
  APP_NAME: AnnaExpenses
  BUNDLE_ID: com.youngandai.AnnaExpenses
  XCODE_PROJECT: swift/AnnaExpenses.xcodeproj
  XCODE_SCHEME: AnnaExpenses

  # ── Distribution ──
  # The public repo that hosts appcast.xml (GitHub Pages) and .zip (Releases)
  RELEASES_REPO: youngandai/mac-app-releases
  # Subdirectory in the releases repo for this app's appcast
  APPCAST_DIR: anna-expenses

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────
      # 1. DETERMINE VERSION
      # ────────────────────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_RELEASE=true
          else
            VERSION="0.0.0-dev"
            IS_RELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Building $APP_NAME v$VERSION (release=$IS_RELEASE)"

      # ────────────────────────────────────────────────────────
      # 2. IMPORT SIGNING CERTIFICATE (release only)
      #
      # Creates a temporary keychain, imports the Developer ID
      # certificate, and configures access so codesign can use
      # it without GUI prompts.
      # ────────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        id: keychain
        if: steps.version.outputs.is_release == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing-${{ github.run_id }}.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Store for later steps
          echo "path=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "password=$KEYCHAIN_PASSWORD" >> $GITHUB_OUTPUT

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          CERT_FILE="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"
          security import "$CERT_FILE" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_FILE"

          # Allow codesign to access the key without GUI prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (append, don't replace)
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Verify import succeeded
          echo "--- Imported identities ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ────────────────────────────────────────────────────────
      # 3. BUILD
      # ────────────────────────────────────────────────────────
      - name: Build app (dev, ad-hoc signing)
        if: steps.version.outputs.is_release != 'true'
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_IDENTITY: "-"
          CI: "true"
        run: scripts/make-app.sh

      - name: Build app (release, Developer ID + notarization)
        if: steps.version.outputs.is_release == 'true'
        env:
          ANNA_EXPENSES_VERSION: ${{ steps.version.outputs.version }}
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.path }}
          KEYCHAIN_PASSWORD: ${{ steps.keychain.outputs.password }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          CI: "true"
        run: scripts/make-app.sh

      # ────────────────────────────────────────────────────────
      # 4. PACKAGE
      #
      # ditto creates a proper macOS zip that preserves resource
      # forks and extended attributes.
      # ────────────────────────────────────────────────────────
      - name: Create ZIP archive
        run: |
          ditto -c -k --keepParent \
            "build/$APP_NAME.app" \
            "build/$APP_NAME.app.zip"
          echo "Archive size: $(du -h "build/$APP_NAME.app.zip" | cut -f1)"

      # ────────────────────────────────────────────────────────
      # 5. UPLOAD ARTIFACT (all builds)
      # ────────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}
          path: build/${{ env.APP_NAME }}.app.zip
          retention-days: 90

      # ────────────────────────────────────────────────────────
      # 6. SPARKLE SIGNING (release only)
      #
      # sign_update creates an Ed25519 signature of the archive.
      # This is Sparkle's own verification layer, separate from
      # Apple code signing. The private key is piped via stdin
      # (--ed-key-file -) so it never touches disk.
      #
      # Output format:
      #   sparkle:edSignature="..." length="..."
      # This gets embedded directly into the appcast.xml enclosure.
      # ────────────────────────────────────────────────────────
      - name: Sign archive for Sparkle
        if: steps.version.outputs.is_release == 'true'
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE="build/DerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update"

          if [ ! -f "$SIGN_UPDATE" ]; then
            echo "::error::sign_update not found at $SIGN_UPDATE"
            echo "Sparkle may not have been fetched via SPM during build."
            exit 1
          fi

          SPARKLE_SIG=$(echo "$SPARKLE_PRIVATE_KEY" | \
            "$SIGN_UPDATE" "build/$APP_NAME.app.zip" --ed-key-file -)

          echo "Sparkle signature: $SPARKLE_SIG"

          # Use heredoc delimiter for multi-line/special chars
          echo "signature<<EOF" >> $GITHUB_OUTPUT
          echo "$SPARKLE_SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ────────────────────────────────────────────────────────
      # 7. GENERATE APPCAST (release only)
      #
      # The appcast.xml is an RSS 2.0 feed that Sparkle polls to
      # discover new versions. It contains:
      #   - Version number
      #   - Download URL (pointing to GitHub Releases)
      #   - Ed25519 signature for verification
      #   - File size
      #   - Publication date
      # ────────────────────────────────────────────────────────
      - name: Generate appcast.xml
        if: steps.version.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_SIG: ${{ steps.sparkle.outputs.signature }}
        run: |
          DOWNLOAD_URL="https://github.com/$RELEASES_REPO/releases/download/$APPCAST_DIR-v${VERSION}/$APP_NAME.app.zip"
          PUBDATE="$(date -R)"

          cat > build/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>${APP_NAME} Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${PUBDATE}</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  type="application/octet-stream"
                  ${SPARKLE_SIG}
                />
              </item>
            </channel>
          </rss>
          APPCAST

      # ────────────────────────────────────────────────────────
      # 8. PUBLISH RELEASE (release only)
      #
      # Two destinations:
      #   a) Source repo — a GitHub Release for tracking history
      #   b) youngandai/mac-app-releases — the public distribution
      #      point with the .zip on Releases and appcast.xml
      #      committed to the repo (served via GitHub Pages)
      # ────────────────────────────────────────────────────────
      - name: Create release in source repo
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "$APP_NAME v${VERSION}" \
            --generate-notes \
            "build/$APP_NAME.app.zip" \
            build/appcast.xml

      - name: Publish to mac-app-releases
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.MAC_APP_RELEASES_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Upload .zip as a GitHub Release asset
          gh release create "$APPCAST_DIR-v${VERSION}" \
            --repo "$RELEASES_REPO" \
            --title "$APP_NAME v${VERSION}" \
            --notes "$APP_NAME v${VERSION}" \
            "build/$APP_NAME.app.zip"

          # Update appcast.xml in the repo (served via GitHub Pages)
          CLONE_DIR="$RUNNER_TEMP/mac-app-releases"
          rm -rf "$CLONE_DIR"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${RELEASES_REPO}.git" "$CLONE_DIR"
          mkdir -p "$CLONE_DIR/$APPCAST_DIR"
          cp build/appcast.xml "$CLONE_DIR/$APPCAST_DIR/appcast.xml"
          cd "$CLONE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$APPCAST_DIR/appcast.xml"
          git commit -m "Update $APP_NAME appcast for v${VERSION}" || echo "No appcast changes to commit"
          git push origin main
          rm -rf "$CLONE_DIR"

      # ────────────────────────────────────────────────────────
      # 9. CLEANUP
      #
      # Always delete the temporary keychain, even if the build
      # failed, to avoid leaking certificates on the runner.
      # ────────────────────────────────────────────────────────
      - name: Clean up signing keychain
        if: always() && steps.version.outputs.is_release == 'true'
        run: |
          KEYCHAIN_PATH="${{ steps.keychain.outputs.path }}"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
            echo "Deleted temporary keychain"
          fi
