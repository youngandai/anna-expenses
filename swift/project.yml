name: AnnaExpenses
options:
  bundleIdPrefix: com.youngchingjui
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  AnnaExpenses:
    type: application
    platform: macOS
    sources:
      - AnnaExpenses
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngchingjui.AnnaExpenses
        PRODUCT_NAME: AnnaExpenses
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: AnnaExpenses/Info.plist
      properties:
        SUFeedURL: "https://youngandai.github.io/mac-app-releases/anna-expenses/appcast.xml"
        SUPublicEDKey: "RBro588JTUjkeuMU0a6bmOU98iWamtLh8ydiSfLEVug="
